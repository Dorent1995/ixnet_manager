name: Build Release and Installer

on:
  push:
    branches: [ "design/macos-ui" ]
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Build solution (Release)
        shell: cmd
        run: msbuild iXnetManager.sln /p:Configuration=Release /p:Platform="Mixed Platforms" /m

      - name: Install Inno Setup
        shell: cmd
        run: choco install innosetup -y --no-progress

      - name: Build installer
        shell: cmd
        working-directory: installer
        run: '"C:\Program Files (x86)\Inno Setup 6\ISCC.exe" setup.iss'

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: iXnetManager-build
          path: |
            iXnetManager/bin/Release/iXnetManager.exe
            iXnetManager/bin/Release/iXnetManager.exe.config
            iXnetManager/bin/Release/iXnet.dll
            iXnetManager/bin/Release/ObjectListView.dll
            installer/output/*.exe

      - name: Publish build output to branch
        shell: bash
        run: |
          set -e
          mkdir -p /tmp/build-out
          cp iXnetManager/bin/Release/iXnetManager.exe /tmp/build-out/
          cp iXnetManager/bin/Release/iXnetManager.exe.config /tmp/build-out/ || true
          cp iXnetManager/bin/Release/iXnet.dll /tmp/build-out/
          cp iXnetManager/bin/Release/ObjectListView.dll /tmp/build-out/
          cp installer/output/*.exe /tmp/build-out/

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout --orphan build-output/design-macos-ui
          git rm -rf . > /dev/null 2>&1 || true
          rm -rf ./* 2>/dev/null || true
          cp /tmp/build-out/* .
          echo "Automated build output. Source commit: ${GITHUB_SHA}" > BUILD_INFO.txt
          git add -A
          git commit -m "Automated build output for design/macos-ui (${GITHUB_SHA})"
          git push -f origin HEAD:build-output/design-macos-ui
