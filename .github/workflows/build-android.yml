name: Build Android App

on:
  push:
    branches:
      - "feature/android-app"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Install Android SDK cmdline-tools
        run: |
          set -e
          SDK_ROOT="$HOME/android-sdk"
          mkdir -p "$SDK_ROOT/cmdline-tools"
          cd "$SDK_ROOT/cmdline-tools"
          curl -sSLo cmdline-tools.zip https://dl.google.com/android/repository/commandlinetools-linux-14742923_latest.zip
          unzip -q cmdline-tools.zip
          mv cmdline-tools latest
          echo "ANDROID_HOME=$SDK_ROOT" >> "$GITHUB_ENV"
          echo "ANDROID_SDK_ROOT=$SDK_ROOT" >> "$GITHUB_ENV"
          echo "$SDK_ROOT/cmdline-tools/latest/bin" >> "$GITHUB_PATH"
          echo "$SDK_ROOT/platform-tools" >> "$GITHUB_PATH"

      - name: Install SDK packages
        run: |
          set -e
          yes | sdkmanager --sdk_root="$ANDROID_HOME" --licenses > /dev/null || true
          sdkmanager --sdk_root="$ANDROID_HOME" "platform-tools" "platforms;android-34" "build-tools;34.0.0"

      - name: Install Gradle
        run: |
          set -e
          curl -sSLo gradle.zip https://services.gradle.org/distributions/gradle-8.7-bin.zip
          unzip -q gradle.zip -d "$HOME/gradle-dist"
          echo "$HOME/gradle-dist/gradle-8.7/bin" >> "$GITHUB_PATH"

      - name: Build debug APK
        id: build
        continue-on-error: true
        working-directory: android
        run: |
          gradle assembleDebug --stacktrace --no-daemon 2>&1 | tee build.log

      - name: Publish build output + logs to branch (always)
        if: always()
        run: |
          mkdir -p /tmp/build-out
          cp android/build.log /tmp/build-out/ 2>/dev/null || true
          find android/app/build/outputs/apk -name "*.apk" -exec cp {} /tmp/build-out/ \; 2>/dev/null || true

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout --orphan build-output/android-app
          git rm -rf . > /dev/null 2>&1 || true
          rm -rf ./* 2>/dev/null || true
          cp /tmp/build-out/* . 2>/dev/null || true
          echo "Automated Android build output. Source commit: ${GITHUB_SHA}" > BUILD_INFO.txt
          git add -A
          git commit -m "Automated Android build output for ${GITHUB_SHA}" --allow-empty
          git push -f origin HEAD:build-output/android-app
